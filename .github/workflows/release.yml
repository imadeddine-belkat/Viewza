name: Build and Release Tauri App

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm install

      - name: Write updater private key
        shell: pwsh
        run: |
          Set-Content -Path ".\viewza-updater.key" -Value "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" -NoNewline

      - name: Build signed Tauri app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_PATH: .\viewza-updater.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Show generated files
        shell: pwsh
        run: |
          dir src-tauri\target\release\bundle\nsis
          dir src-tauri\target\release\bundle\msi
          dir src-tauri\target\release\bundle

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Viewza ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
            src-tauri/target/release/bundle/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}