name: Build and Release Tauri App

# Trigger the action only when a tag starting with 'v' is pushed
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write # Required for the action to create a GitHub Release
    
    # We are using Windows to generate the .exe
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # or whatever version you prefer
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Write private key
        shell: bash
        run: |
          echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" > tauri.key

      - name: Build and Publish Tauri app
        uses: tauri-apps/tauri-action@v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: tauri.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Viewza ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for what changed.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true